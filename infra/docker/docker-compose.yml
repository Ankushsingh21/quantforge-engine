version: "3.8"

# infra/docker/docker-compose.yml
# Full QuantForge stack - starts both projects plus all shared services.
# Run from quantforge-engine/:
# docker compose -f infra/docker/docker-compose.yml up -d
# Requires .env inside quantforge/ (copy from quantforge/.env.example)

name: quantforge

services:

  # C++ Engine (paper trading in dev)
  quantforge-engine:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.cpp

    environment:
      - UPSTOX_API_KEY=${UPSTOX_API_KEY}
      - UPSTOX_ACCESS_TOKEN=${UPSTOX_ACCESS_TOKEN}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - PAPER_TRADING=true
      - LOG_LEVEL=info

    volumes:
      - ../../config:/app/config:ro
      - ../../logs:/app/logs
      - ../../../quantforge/.token:/app/.token:ro

    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

    network_mode: host

    ulimits:
      memlock: -1
      rtprio: 99

    restart: unless-stopped

  # Python Research + Paper Trader
  quantforge-python:
    build:
      context: ../../../quantforge
      dockerfile: Dockerfile

    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - PAPER_TRADING=true

    volumes:
      - ../../../quantforge:/app:cached
      - ../../../quantforge/notebooks:/notebooks:cached
      - ../../config:/config:ro
      - ../../logs:/logs

    ports:
      - "8888:8888"   # Jupyter
      - "8080:8080"   # FastAPI analytics

    depends_on:
      - clickhouse
      - redis
      - kafka

    restart: unless-stopped

  # ClickHouse (primary analytical store)
  clickhouse:
    image: clickhouse/clickhouse-server:24.3

    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ../../infra/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ../../infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

    ports:
      - "8123:8123"
      - "9000:9000"

    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1

    ulimits:
      nofile: 262144

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  # QuestDB (real-time intraday monitoring)
  questdb:
    image: questdb/questdb:7.4.0

    volumes:
      - questdb_data:/root/.questdb

    ports:
      - "9009:9009"
      - "9001:9000"

    environment:
      - QDB_CAIRO_COMMIT_LAG=100
      - QDB_LINE_TCP_IO_WORKER_COUNT=2

    restart: unless-stopped

  # Redis (hot state store)
  redis:
    image: redis:7.2-alpine

    command: >
      redis-server
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --loglevel warning

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    restart: unless-stopped

  # Zookeeper (for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    volumes:
      - zk_data:/var/lib/zookeeper

    ports:
      - "2181:2181"

    restart: unless-stopped

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0

    depends_on:
      - zookeeper

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_NUM_PARTITIONS: 32
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - kafka_data:/var/lib/kafka

    ports:
      - "9092:9092"

    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092"
        ]
      interval: 15s
      timeout: 10s
      retries: 5

    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.50.0

    volumes:
      - ../../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    ports:
      - "9090:9090"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-admin-api"

    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:10.3.0

    depends_on:
      - prometheus
      - loki

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-quantforge}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_USERS_ALLOW_SIGN_UP=false

    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro

    ports:
      - "3000:3000"

    restart: unless-stopped

  # Loki (log aggregation)
  loki:
    image: grafana/loki:2.9.0

    volumes:
      - ../../infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

    ports:
      - "3100:3100"

    restart: unless-stopped

  # AlertManager
  alertmanager:
    image: prom/alertmanager:v0.27.0

    volumes:
      - ../../infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

    ports:
      - "9093:9093"

    restart: unless-stopped

volumes:
  clickhouse_data:
  questdb_data:
  redis_data:
  kafka_data:
  zk_data:
  prometheus_data:
  grafana_data:
  loki_data: