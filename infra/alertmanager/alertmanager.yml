# infra/alertmanager/alertmanager.yml
# Alert routing for QuantForge trading engine

global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "${ALERT_EMAIL_FROM}"
  smtp_auth_username: "${ALERT_EMAIL_FROM}"
  smtp_auth_password: "${ALERT_EMAIL_PASSWORD}"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "strategy_id"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "default"

  routes:
    # Critical trading alerts - immediate notification
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 0s
      repeat_interval: 15m

    # Kill switch engaged - highest priority
    - match:
        alertname: GlobalKillSwitchEngaged
      receiver: "critical"
      group_wait: 0s
      repeat_interval: 5m

    # Strategy halted
    - match:
        alertname: StrategyHalted
      receiver: "critical"
      group_wait: 5s

    # Market data interruption
    - match:
        alertname: MarketDataDisconnected
      receiver: "trading-ops"
      group_wait: 30s
      repeat_interval: 5m

receivers:
  - name: "default"
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true

  - name: "critical"
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] QuantForge Alert: {{ .GroupLabels.alertname }}"

    # Uncomment to add Telegram notifications:
    # webhook_configs:
    #   - url: 'http://telegram-alertmanager:8080/alert'

  - name: "trading-ops"
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true

inhibit_rules:
  # Inhibit warnings when critical is firing for same strategy
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["strategy_id"]
